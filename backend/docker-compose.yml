services:
  postgres:
    image: postgres:17-alpine
    container_name: rednest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rednest
      POSTGRES_PASSWORD: rednest
      POSTGRES_DB: rednest
    ports:
      - "5432:5432"
    volumes:
      - rednest_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rednest -d rednest"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rednest-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - rednest_redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  rednest_pgdata:
  rednest_redisdata:
