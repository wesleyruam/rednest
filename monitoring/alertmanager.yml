route:
  receiver: telegram
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h

receivers:
  - name: telegram
    telegram_configs:
      - bot_token_file: /etc/alertmanager/telegram_token
        chat_id: __CHAT_ID__
        parse_mode: HTML
        send_resolved: true
        message: |
          {{ if eq .Status "firing" }}🔴{{ else }}✅{{ end }} <b>{{ .CommonLabels.alertname }}</b> [{{ .CommonLabels.severity }}] — {{ .Status | toUpper }}
          {{ range .Alerts }}
          • {{ .Annotations.summary }}
          {{ .Annotations.description }}{{ end }}
