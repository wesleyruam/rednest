server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Capturas de tela / source de páginas podem ser grandes (vários MB).
  client_max_body_size 30m;

  # Proxy das chamadas de API para o backend (mesma origem -> sem CORS)
  location /api/ {
    proxy_pass http://backend:3333;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Suporte a SSE (text/event-stream): sem buffering p/ os eventos
    # chegarem em tempo real; HTTP/1.1 + timeout longo p/ a conexão.
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
